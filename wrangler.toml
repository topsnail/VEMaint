# Cloudflare Pages + next-on-pages
# 本地：`npm run dev`（next-on-pages next-dev 会注入 D1/KV/R2 绑定）
# 预览生产构建：`npm run pages:dev`

name = "vemaint"
compatibility_date = "2024-10-22"
pages_build_output_dir = ".open-next/assets"
compatibility_flags = ["nodejs_compat"]

# D1：使用与 Cloudflare 控制台中绑定相同的名称
[[d1_databases]]
binding = "DB"
database_name = "vemaint"
database_id = "745ac509-c99d-4e9b-8620-44831093244e"  # 在 Cloudflare 控制台中获取
migrations_dir = "drizzle/migrations"

# KV：使用与 Cloudflare 控制台中绑定相同的名称
[[kv_namespaces]]
binding = "KV"
id = "934631cf47c84ab5b92f813fb8ec727d"  # 在 Cloudflare 控制台中获取

# R2：使用与 Cloudflare 控制台中绑定相同的名称
[[r2_buckets]]
binding = "R2"
bucket_name = "vemaint"  # 在 Cloudflare 控制台中获取
