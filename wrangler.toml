# Cloudflare Pages + next-on-pages
# 本地：`npm run dev`（next-on-pages next-dev 会注入 D1/KV/R2 绑定）
# 预览生产构建：`npm run pages:dev`

name = "vemaint"
compatibility_date = "2024-10-22"
pages_build_output_dir = ".vercel/output/static"

# D1：创建远程库后把 database_id 换成控制台里的 UUID
[[d1_databases]]
binding = "DB"
database_name = "vehicle-maintenance-db"
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "drizzle/migrations"

# KV：创建命名空间后替换 id
[[kv_namespaces]]
binding = "KV"
id = "00000000000000000000000000000001"

# R2：桶名与控制台一致；本地 wrangler 会模拟桶
[[r2_buckets]]
binding = "R2"
bucket_name = "vehicle-maintenance-files"
